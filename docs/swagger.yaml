openapi: 3.0.0
info:
  title: TurkeyWeather API
  version: 1.0.0
  description: Türkiye'deki 81 il için hava durumu API dokümantasyonu

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: API is running

  /api:
    get:
      summary: API overview
      responses:
        "200":
          description: Overview response

  /api/cities:
    get:
      summary: List cities
      parameters:
        - in: query
          name: region
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Cities list response

  /api/weather:
    get:
      summary: Current weather by city
      parameters:
        - in: query
          name: city
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current weather response
        "400":
          description: city query parameter is required
        "404":
          description: City not found

  /api/weather/forecast:
    get:
      summary: Forecast by city
      parameters:
        - in: query
          name: city
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Forecast response
        "400":
          description: city query parameter is required
        "404":
          description: City not found
