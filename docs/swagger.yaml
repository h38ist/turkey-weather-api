openapi: 3.0.0
info:
  title: TurkeyWeather API
  version: 1.0.0
  description: Türkiye şehirleri için hava durumu API dokümantasyonu

paths:
  /health:
    get:
      summary: Health check endpoint
      responses:
        "200":
          description: API is running

  /api/cities:
    get:
      summary: Get cities list
      parameters:
        - in: query
          name: region
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Cities response
